name: Deploy to Supabase + GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Migrations + Edge Functions
    runs-on: ubuntu-latest
    environment: moodle-consultas

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: scrzziyuruzzhebpzvdl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: |
          supabase link \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Run database migrations
        run: supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Deploy Edge Function — moodle-proxy
        run: supabase functions deploy moodle-proxy --no-verify-jwt

      - name: Deploy Edge Function — register
        run: supabase functions deploy register --no-verify-jwt

  deploy-pages:
    name: GitHub Pages
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
