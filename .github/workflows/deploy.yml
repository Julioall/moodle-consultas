name: Deploy to Supabase + GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-supabase:
    name: Edge Functions
    runs-on: ubuntu-latest
    environment: moodle-consultas

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: scrzziyuruzzhebpzvdl
      API_KEY_HASH_SECRET: ${{ secrets.API_KEY_HASH_SECRET }}
      MOODLE_OPENAPI_SCHEMA_URL: ${{ vars.MOODLE_OPENAPI_SCHEMA_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply database migrations
        run: |
          for file in supabase/migrations/*.sql; do
            echo "Applying $file"
            SQL_FILE="$file" node -e "const fs = require('fs'); const file = process.env.SQL_FILE; const query = fs.readFileSync(file, 'utf8'); fs.writeFileSync('/tmp/supabase-sql-payload.json', JSON.stringify({ query, read_only: false }));"
            curl --fail-with-body \
              --request POST \
              --url "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/database/query" \
              --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
              --header "Content-Type: application/json" \
              --data @/tmp/supabase-sql-payload.json
          done

      - name: Sync Edge Function secrets
        run: |
          if [ -n "$API_KEY_HASH_SECRET" ]; then
            supabase secrets set API_KEY_HASH_SECRET="$API_KEY_HASH_SECRET" \
              --project-ref "$SUPABASE_PROJECT_ID"
          else
            echo "::warning::API_KEY_HASH_SECRET is not configured in GitHub secrets. Existing Supabase secret will be used if already present."
          fi

          if [ -n "$MOODLE_OPENAPI_SCHEMA_URL" ]; then
            supabase secrets set MOODLE_OPENAPI_SCHEMA_URL="$MOODLE_OPENAPI_SCHEMA_URL" \
              --project-ref "$SUPABASE_PROJECT_ID"
          fi

      - name: Deploy Edge Function — moodle-proxy
        run: |
          supabase functions deploy moodle-proxy \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --no-verify-jwt

      - name: Deploy Edge Function — platform-api
        run: |
          supabase functions deploy platform-api \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --no-verify-jwt

      - name: Remove legacy Edge Function — register
        run: |
          curl --request DELETE \
            --url "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/functions/register" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --fail-with-body || true

  deploy-pages:
    name: GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: https://scrzziyuruzzhebpzvdl.supabase.co
          VITE_SUPABASE_FUNCTIONS_BASE_URL: https://scrzziyuruzzhebpzvdl.supabase.co/functions/v1
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || vars.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
