name: Deploy to Supabase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Migrations + Edge Functions
    runs-on: ubuntu-latest
    environment: moodle-consultas

    env:
      SUPABASE_PROJECT_ID: scrzziyuruzzhebpzvdl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run database migrations
        run: |
          supabase db push \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Function — moodle-proxy
        run: |
          supabase functions deploy moodle-proxy \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Function — register
        run: |
          supabase functions deploy register \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
