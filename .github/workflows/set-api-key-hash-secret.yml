name: Set API key hash secret

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  set-secret:
    runs-on: ubuntu-latest
    environment: moodle-consultas

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: scrzziyuruzzhebpzvdl

    steps:
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Generate and set API_KEY_HASH_SECRET
        run: |
          API_KEY_HASH_SECRET="$(openssl rand -hex 32)"
          supabase secrets set API_KEY_HASH_SECRET="$API_KEY_HASH_SECRET" \
            --project-ref "$SUPABASE_PROJECT_ID"
          echo "::notice::API_KEY_HASH_SECRET configured in Supabase Edge Function secrets."
