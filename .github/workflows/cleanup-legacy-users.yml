name: One-off cleanup legacy users

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-legacy-users.yml

permissions:
  contents: read

jobs:
  cleanup:
    name: Truncate legacy API key tables
    runs-on: ubuntu-latest
    environment: moodle-consultas

    env:
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: scrzziyuruzzhebpzvdl

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Cleanup legacy users
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$PGPASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret is not configured."
            exit 1
          fi

          SQL_FILE="$(mktemp)"
          cat > "$SQL_FILE" <<'SQL'
          begin;

          truncate table public.moodle_user_sessions restart identity cascade;
          truncate table public.api_keys restart identity cascade;

          commit;

          select count(*) as api_keys_count from public.api_keys;
          select count(*) as moodle_sessions_count from public.moodle_user_sessions;
          SQL

          run_cleanup() {
            local label="$1"
            local connection="$2"

            if psql "$connection" -v ON_ERROR_STOP=1 -f "$SQL_FILE" > cleanup.out 2> cleanup.err; then
              cat cleanup.out
              return 0
            fi

            error_message="$(tail -n 8 cleanup.err | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g')"
            echo "::warning::${label} connection failed: ${error_message}"
            return 1
          }

          direct_connection="host=db.${SUPABASE_PROJECT_ID}.supabase.co port=5432 dbname=postgres user=postgres sslmode=require connect_timeout=10"
          pooler_connection="host=aws-0-sa-east-1.pooler.supabase.com port=6543 dbname=postgres user=postgres.${SUPABASE_PROJECT_ID} sslmode=require connect_timeout=10"

          run_cleanup "direct" "$direct_connection" || run_cleanup "pooler" "$pooler_connection"
