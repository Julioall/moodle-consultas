name: One-off cleanup legacy users

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-legacy-users.yml

permissions:
  contents: read

jobs:
  cleanup-teardown:
    name: Remove temporary cleanup function
    runs-on: ubuntu-latest
    environment: moodle-consultas

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: scrzziyuruzzhebpzvdl

    steps:
      - name: Remove deployed cleanup function
        run: |
          curl -fsS \
            -X DELETE \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_ID}/functions/cleanup-legacy-users" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}"

          echo "::notice::Temporary cleanup Edge Function removed."
