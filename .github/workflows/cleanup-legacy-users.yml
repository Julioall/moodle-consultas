name: One-off cleanup legacy users

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-legacy-users.yml
      - supabase/functions/cleanup-legacy-users/**

permissions:
  contents: read

jobs:
  cleanup:
    name: Cleanup through temporary Edge Function
    runs-on: ubuntu-latest
    environment: moodle-consultas

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: scrzziyuruzzhebpzvdl
      FUNCTION_URL: https://scrzziyuruzzhebpzvdl.supabase.co/functions/v1/cleanup-legacy-users

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Generate cleanup token
        run: |
          CLEANUP_TOKEN="$(openssl rand -hex 32)"
          echo "::add-mask::$CLEANUP_TOKEN"
          echo "CLEANUP_TOKEN=$CLEANUP_TOKEN" >> "$GITHUB_ENV"

      - name: Deploy temporary cleanup function
        run: |
          supabase secrets set CLEANUP_TOKEN="$CLEANUP_TOKEN" --project-ref "$SUPABASE_PROJECT_ID"
          supabase functions deploy cleanup-legacy-users \
            --project-ref "$SUPABASE_PROJECT_ID" \
            --no-verify-jwt

      - name: Run cleanup
        run: |
          response="$(
            curl -fsS \
              -X POST "$FUNCTION_URL" \
              -H "x-cleanup-token: $CLEANUP_TOKEN"
          )"

          echo "$response" | jq .

          api_keys_count="$(echo "$response" | jq -r '.after.apiKeys')"
          moodle_sessions_count="$(echo "$response" | jq -r '.after.moodleSessions')"

          if [ "$api_keys_count" != "0" ] || [ "$moodle_sessions_count" != "0" ]; then
            echo "::error::Cleanup validation failed: api_keys=$api_keys_count moodle_sessions=$moodle_sessions_count"
            exit 1
          fi

          echo "::notice::Cleanup completed: api_keys=$api_keys_count moodle_sessions=$moodle_sessions_count"

      - name: Remove cleanup secret
        if: always()
        run: |
          supabase secrets unset CLEANUP_TOKEN --project-ref "$SUPABASE_PROJECT_ID" || true
