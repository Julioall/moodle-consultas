openapi: 3.1.0
info:
  title: Moodle Consultas Read-Only API
  version: 3.0.0
  description: >
    Action para GPT consultar dados do Moodle por meio de um proxy read-only hospedado no Supabase.
    O Moodle precisa estar ativo no painel do GPT Actions Hub, e o token Moodle do usuário
    fica cifrado no backend. Autentique-se com sua chave de API pessoal no formato
    gah_live_* usando Bearer token.
x-action-auth:
  apiKeyFormat: gah_live_*
  inactiveServiceStatus: 403
  inactiveServiceError: service_inactive
  invalidKeyStatus: 401
  invalidKeyError: unauthorized
servers:
  - url: https://scrzziyuruzzhebpzvdl.supabase.co/functions/v1/moodle-proxy
    description: Proxy Moodle hospedado no Supabase Edge Functions
security:
  - bearerAuth: []
paths:
  /courses:
    get:
      operationId: findCourses
      summary: Buscar ou listar cursos
      description: >
        Modo texto (query): usa core_course_search_courses. Aceita page, perPage e limitToEnrolled.
        Modo exato (field + value): usa core_course_get_courses_by_field. field pode ser id, ids,
        shortname, idnumber ou category. Para ids, separe os IDs por vírgula em value.
        Sem parâmetros: lista todos os cursos visíveis ao token.
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: Texto para busca no nome ou resumo do curso. Quando presente, ativa modo busca textual.
        - in: query
          name: field
          required: false
          schema:
            type: string
            enum: ["", "id", "ids", "shortname", "idnumber", "category"]
          description: Campo para filtro exato. Ignorado quando query estiver presente.
        - in: query
          name: value
          required: false
          schema:
            type: string
          description: Valor do campo. Para ids, use IDs separados por vírgula.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 0
          description: Página de resultados (modo busca textual).
        - in: query
          name: perPage
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Resultados por página (modo busca textual).
        - in: query
          name: limitToEnrolled
          required: false
          schema:
            type: boolean
            default: false
          description: Se true, limita busca a cursos matriculados (modo busca textual).
      responses:
        "200":
          description: Lista de cursos encontrados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/{courseId}/contents:
    get:
      operationId: getCourseContents
      summary: Consultar seções, módulos e conteúdos de um curso
      description: >
        Retorna todas as seções e módulos do curso com nome, descrição, tipo (modname),
        datas de abertura/fechamento, URL de download de arquivos e metadados de conclusão.
        Use para explorar a estrutura completa do curso.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
      responses:
        "200":
          description: Conteúdos e estrutura do curso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/{courseId}/resources:
    get:
      operationId: getCourseResourcesAndFiles
      summary: Listar arquivos, links e recursos de um curso por seção
      description: >
        Filtra os módulos do curso retornando apenas recursos acessíveis: arquivos (resource),
        links (url), pastas (folder), páginas (page), tarefas (assign), quizzes, SCORM, lições e H5P.
        Organizado por seção. Inclui URLs de download para uso com getModuleFileContent.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
      responses:
        "200":
          description: Recursos do curso organizados por seção
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /files/download:
    get:
      operationId: getModuleFileContent
      summary: Baixar ou ler o conteúdo de um arquivo do Moodle
      description: >
        Baixa um arquivo do Moodle usando a URL obtida em getCourseContents ou getCourseResourcesAndFiles
        (campo fileurl ou downloadurl do módulo). O token Moodle é adicionado automaticamente.
        Para PDFs, tenta extrair o texto interno. Para arquivos de texto e HTML, retorna o conteúdo direto.
        Para outros binários, retorna metadados e uma downloadUrl autenticada.
      parameters:
        - in: query
          name: fileurl
          required: true
          schema:
            type: string
          description: URL do arquivo no Moodle (obtida em getCourseContents ou getCourseResourcesAndFiles).
      responses:
        "200":
          description: Conteúdo do arquivo ou metadados com URL de download autenticada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "504":
          description: Timeout ao baixar o arquivo do Moodle.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/search:
    get:
      operationId: findUsers
      summary: Buscar usuários por critério ou por campo exato
      description: >
        Modo critério (key + value): usa core_user_get_users. key pode ser id, lastname, firstname,
        idnumber, username, email ou auth. value aceita % para busca parcial em alguns campos.
        Modo campo exato (field + values): usa core_user_get_users_by_field. field pode ser
        id, idnumber, username ou email. values aceita múltiplos valores separados por vírgula.
        Use o modo que melhor se adequar à busca.
      parameters:
        - in: query
          name: key
          required: false
          schema:
            type: string
            enum: ["id", "lastname", "firstname", "idnumber", "username", "email", "auth"]
          description: Campo de critério (modo critério). Obrigatório se field não for informado.
        - in: query
          name: value
          required: false
          schema:
            type: string
          description: Valor do critério. Aceita % para busca parcial em alguns campos.
        - in: query
          name: field
          required: false
          schema:
            type: string
            enum: ["id", "idnumber", "username", "email"]
          description: Campo para busca exata (modo campo exato). Quando presente, sobrepõe key/value.
        - in: query
          name: values
          required: false
          schema:
            type: string
          description: Valores separados por vírgula para busca exata (modo campo exato).
      responses:
        "200":
          description: Usuários encontrados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/{courseId}/students:
    get:
      operationId: getCourseStudents
      summary: Consultar participantes de um curso com dados de acesso
      description: >
        Usa core_enrol_get_enrolled_users. Retorna id, nome, email, firstaccess, lastaccess,
        lastcourseaccess e roles quando a permissão do token permitir.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
        - in: query
          name: onlyActive
          required: false
          schema:
            type: boolean
            default: true
        - in: query
          name: limitFrom
          required: false
          schema:
            type: integer
            default: 0
        - in: query
          name: limitNumber
          required: false
          schema:
            type: integer
            default: 100
            maximum: 500
        - in: query
          name: sortBy
          required: false
          schema:
            type: string
            enum: ["id", "firstname", "lastname", "siteorder"]
            default: "lastname"
        - in: query
          name: sortDirection
          required: false
          schema:
            type: string
            enum: ["ASC", "DESC"]
            default: "ASC"
      responses:
        "200":
          description: Participantes do curso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{userId}/courses:
    get:
      operationId: getUserCourses
      summary: Consultar cursos nos quais um usuário está matriculado
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          description: ID do usuário no Moodle.
        - in: query
          name: returnUserCount
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Cursos do usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{userId}/courses/{courseId}/pending-activities:
    get:
      operationId: getStudentProgress
      summary: Consultar progresso e atividades pendentes de um aluno em um curso
      description: >
        Relatório composto. Combina status de conclusão (core_completion_get_activities_completion_status),
        conteúdos do curso e tarefas para listar atividades incompletas ou pendentes visíveis ao token.
        Use para saber o que o aluno ainda não concluiu.
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          description: ID do aluno no Moodle.
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
        - in: query
          name: includeUntracked
          required: false
          schema:
            type: boolean
            default: false
          description: Se true, inclui módulos sem rastreamento de conclusão.
      responses:
        "200":
          description: Atividades pendentes e progresso do aluno
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{userId}/courses/{courseId}/grades:
    get:
      operationId: getStudentGrades
      summary: Consultar notas de um aluno em um curso
      description: Usa gradereport_user_get_grade_items.
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          description: ID do aluno no Moodle.
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
      responses:
        "200":
          description: Notas do aluno no curso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /assignments/course/{courseId}:
    get:
      operationId: getCourseAssignments
      summary: Consultar tarefas avaliativas de um curso
      description: Usa mod_assign_get_assignments. Retorna todas as tarefas com prazos, configurações e metadados.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
      responses:
        "200":
          description: Tarefas do curso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/{courseId}/assignments/{assignmentId}:
    get:
      operationId: getAssignmentDetails
      summary: Consultar detalhes de uma tarefa específica do curso
      description: >
        Retorna a tarefa identificada por assignmentId dentro do curso, incluindo enunciado,
        instruções, anexos, datas, nota máxima, método de avaliação e configurações.
        Use getCourseAssignments para obter os IDs das tarefas disponíveis.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
        - in: path
          name: assignmentId
          required: true
          schema:
            type: integer
          description: ID da tarefa no Moodle.
      responses:
        "200":
          description: Detalhes da tarefa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Tarefa não encontrada no curso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /assignments/{assignmentId}/submissions:
    get:
      operationId: getAssignmentSubmissions
      summary: Consultar entregas/submissões de uma tarefa
      description: Usa mod_assign_get_submissions.
      parameters:
        - in: path
          name: assignmentId
          required: true
          schema:
            type: integer
        - in: query
          name: status
          required: false
          schema:
            type: string
          description: Filtro opcional, por exemplo submitted.
        - in: query
          name: since
          required: false
          schema:
            type: integer
          description: Timestamp Unix inicial.
        - in: query
          name: before
          required: false
          schema:
            type: integer
          description: Timestamp Unix final.
      responses:
        "200":
          description: Submissões da tarefa
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/pending-delivery:
    get:
      operationId: reportPendingDelivery
      summary: Relatório de atividades pendentes de entrega
      description: >
        Identifica tarefas com prazo no período e participantes sem submissão enviada.
        Útil para acompanhamento de entregas em aberto.
      parameters:
        - in: query
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
        - in: query
          name: dueFrom
          required: false
          schema:
            type: integer
          description: Timestamp Unix inicial do prazo.
        - in: query
          name: dueTo
          required: false
          schema:
            type: integer
          description: Timestamp Unix final do prazo. Se omitido, usa o momento atual.
        - in: query
          name: onlyActive
          required: false
          schema:
            type: boolean
            default: true
        - in: query
          name: limitStudents
          required: false
          schema:
            type: integer
            default: 500
            maximum: 1000
        - in: query
          name: limitAssignments
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: Relatório de pendências de entrega
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/pending-grading:
    get:
      operationId: reportPendingGrading
      summary: Relatório de entregas pendentes de correção
      description: >
        Busca tarefas do curso, submissões e notas; lista entregas submetidas sem correção
        conforme gradingstatus ou ausência de nota.
      parameters:
        - in: query
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
        - in: query
          name: since
          required: false
          schema:
            type: integer
          description: Timestamp Unix inicial para submissões.
        - in: query
          name: before
          required: false
          schema:
            type: integer
          description: Timestamp Unix final para submissões.
        - in: query
          name: limitAssignments
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: Relatório de pendências de correção
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoodleResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        Chave de API gah_live_* gerada no painel do GPT Actions Hub.
        Não é o token do Moodle — é a chave pessoal do usuário para autenticar no proxy.
  responses:
    Unauthorized:
      description: Chave de API inválida, revogada ou expirada.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Serviço Moodle inativo ou sem permissão para esta conta.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    MoodleResult:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        source:
          type: string
        generatedAt:
          type: string
          format: date-time
        data:
          description: Dados retornados pelo Moodle ou pelo relatório composto.
      additionalProperties: true
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
          examples:
            - unauthorized
            - service_inactive
            - moodle_session_required
        message:
          type: string
