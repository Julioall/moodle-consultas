openapi: 3.1.0
info:
  title: Moodle Consultas Read-Only API
  version: 3.0.0
  description: >
    Action para GPT consultar dados do Moodle por meio de um proxy read-only hospedado no Supabase.
    O Moodle precisa estar ativo no painel do GPT Actions Hub, e o token Moodle do usuário
    fica cifrado no backend. Autentique-se com sua chave de API pessoal no formato
    gah_live_* usando Bearer token.
x-action-auth:
  apiKeyFormat: gah_live_*
  inactiveServiceStatus: 403
  inactiveServiceError: service_inactive
  invalidKeyStatus: 401
  invalidKeyError: unauthorized
servers:
  - url: https://scrzziyuruzzhebpzvdl.supabase.co/functions/v1/moodle-proxy
    description: Proxy Moodle hospedado no Supabase Edge Functions
security:
  - bearerAuth: []
paths:
  /courses:
    get:
      operationId: findCourses
      summary: Buscar ou listar cursos
      description: >
        Modo texto (query): usa core_course_search_courses. Aceita page, perPage e limitToEnrolled.
        Modo exato (field + value): usa core_course_get_courses_by_field. field pode ser id, ids,
        shortname, idnumber ou category. Sem parâmetros, lista cursos visíveis ao token.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/search:
    get:
      operationId: searchCourses
      summary: Pesquisar cursos por texto
      description: Usa core_course_search_courses com criterianame=search.
      parameters:
        - in: query
          name: query
          required: true
          schema:
            type: string
          description: Texto para buscar no nome ou resumo do curso.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Página de resultados.
        - in: query
          name: perPage
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
          description: Resultados por página.
        - in: query
          name: limitToEnrolled
          required: false
          schema:
            type: boolean
            default: false
          description: Se true, limita busca a cursos matriculados.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/{courseId}/contents:
    get:
      operationId: getCourseContents
      summary: Consultar seções, módulos e conteúdos de um curso
      description: >
        Retorna seções e módulos do curso com nome, descrição, tipo, datas, URLs e metadados
        disponíveis para a sessão Moodle ativa.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/{courseId}/students:
    get:
      operationId: getCourseStudents
      summary: Consultar participantes de um curso com dados de acesso
      description: >
        Usa core_enrol_get_enrolled_users. Retorna id, nome, email, firstaccess, lastaccess,
        lastcourseaccess e roles quando a permissão do token permitir.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
        - in: query
          name: onlyActive
          required: false
          schema:
            type: boolean
            default: true
        - in: query
          name: limitFrom
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - in: query
          name: limitNumber
          required: false
          schema:
            type: integer
            default: 100
            maximum: 500
        - in: query
          name: sortBy
          required: false
          schema:
            type: string
            enum: ["id", "firstname", "lastname", "siteorder"]
            default: "lastname"
        - in: query
          name: sortDirection
          required: false
          schema:
            type: string
            enum: ["ASC", "DESC"]
            default: "ASC"
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/{courseId}/resources:
    get:
      operationId: getCourseResourcesAndFiles
      summary: Listar arquivos, links e recursos de um curso por seção
      description: >
        Filtra módulos de conteúdo acessíveis, como resource, folder, url, page, book, assign,
        label, scorm, quiz e forum. Retorna os recursos organizados por seção.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/{courseId}/modules/{cmid}:
    get:
      operationId: getCourseModuleDetails
      summary: Consultar detalhes de um módulo específico do curso
      description: Busca o módulo pelo cmid dentro das seções retornadas por core_course_get_contents.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
        - in: path
          name: cmid
          required: true
          schema:
            type: integer
          description: ID do módulo do curso no Moodle.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/assignments/{assignmentId}:
    get:
      operationId: getAssignmentDetails
      summary: Consultar detalhes de uma tarefa específica do curso
      description: >
        Retorna a tarefa identificada por assignmentId dentro do curso, incluindo enunciado,
        anexos, datas, nota máxima, método de avaliação e configurações quando disponíveis.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
        - in: path
          name: assignmentId
          required: true
          schema:
            type: integer
          description: ID da tarefa no Moodle.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{courseId}/forums:
    get:
      operationId: getCourseForums
      summary: Consultar fóruns de um curso
      description: Usa mod_forum_get_forums_by_courses.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/{courseId}/calendar:
    get:
      operationId: getCourseCalendarEvents
      summary: Consultar eventos do calendário de um curso
      description: Usa core_calendar_get_action_events_by_course para o período informado.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
        - in: query
          name: from
          required: false
          schema:
            type: integer
          description: Timestamp Unix inicial. Se omitido, usa o momento atual.
        - in: query
          name: to
          required: false
          schema:
            type: integer
          description: Timestamp Unix final. Se omitido, usa aproximadamente 90 dias à frente.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/{courseId}/quizzes:
    get:
      operationId: getCourseQuizzes
      summary: Consultar quizzes de um curso
      description: Usa mod_quiz_get_quizzes_by_courses.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/{courseId}/scorm:
    get:
      operationId: getCourseScorms
      summary: Consultar pacotes SCORM de um curso
      description: Usa mod_scorm_get_scorms_by_courses.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/search:
    get:
      operationId: findUsers
      summary: Buscar usuários por critério ou por campo exato
      description: >
        Modo critério (key + value): usa core_user_get_users. Modo campo exato (field + values):
        usa core_user_get_users_by_field. Para values, envie múltiplos valores separados por vírgula.
      parameters:
        - in: query
          name: key
          required: false
          schema:
            type: string
            enum: ["id", "lastname", "firstname", "idnumber", "username", "email", "auth"]
          description: Campo de critério. Obrigatório se field não for informado.
        - in: query
          name: value
          required: false
          schema:
            type: string
          description: Valor do critério. Aceita % para busca parcial em alguns campos.
        - in: query
          name: field
          required: false
          schema:
            type: string
            enum: ["id", "idnumber", "username", "email"]
          description: Campo para busca exata. Quando presente, sobrepõe key/value.
        - in: query
          name: values
          required: false
          schema:
            type: string
          description: Valores separados por vírgula para busca exata.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{userId}/courses:
    get:
      operationId: getUserCourses
      summary: Consultar cursos nos quais um usuário está matriculado
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          description: ID do usuário no Moodle.
        - in: query
          name: returnUserCount
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{userId}/last-access:
    get:
      operationId: getUserLastAccess
      summary: Consultar últimos acessos de um usuário
      description: >
        Sem courseId, consulta os cursos do usuário e retorna lastaccess por curso quando disponível.
        Com courseId, consulta participantes do curso e filtra o usuário para obter lastcourseaccess.
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          description: ID do usuário no Moodle.
        - in: query
          name: courseId
          required: false
          schema:
            type: integer
          description: ID do curso para consultar acesso do usuário naquele curso.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{userId}/courses/{courseId}/grades:
    get:
      operationId: getStudentGrades
      summary: Consultar notas de um aluno em um curso
      description: Usa gradereport_user_get_grade_items.
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          description: ID do usuário no Moodle.
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{userId}/courses/{courseId}/completion:
    get:
      operationId: getStudentCompletion
      summary: Consultar status de conclusão das atividades de um aluno em um curso
      description: Usa core_completion_get_activities_completion_status.
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          description: ID do usuário no Moodle.
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{userId}/courses/{courseId}/pending-activities:
    get:
      operationId: getStudentPendingActivities
      summary: Consultar progresso e atividades pendentes de um aluno em um curso
      description: >
        Relatório composto. Combina status de conclusão, conteúdos do curso e tarefas para listar
        atividades incompletas ou pendentes visíveis ao token.
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          description: ID do usuário no Moodle.
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
        - in: query
          name: includeUntracked
          required: false
          schema:
            type: boolean
            default: false
          description: Se true, inclui módulos sem rastreamento de conclusão.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /assignments/course/{courseId}:
    get:
      operationId: getCourseAssignments
      summary: Consultar tarefas avaliativas de um curso
      description: Usa mod_assign_get_assignments.
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /assignments/{assignmentId}/submissions:
    get:
      operationId: getAssignmentSubmissions
      summary: Consultar entregas/submissões de uma tarefa
      description: Usa mod_assign_get_submissions.
      parameters:
        - in: path
          name: assignmentId
          required: true
          schema:
            type: integer
          description: ID da tarefa no Moodle.
        - in: query
          name: status
          required: false
          schema:
            type: string
          description: Filtro opcional, por exemplo submitted.
        - in: query
          name: since
          required: false
          schema:
            type: integer
          description: Timestamp Unix inicial.
        - in: query
          name: before
          required: false
          schema:
            type: integer
          description: Timestamp Unix final.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /assignments/{assignmentId}/grades:
    get:
      operationId: getAssignmentGrades
      summary: Consultar notas de uma tarefa
      description: Usa mod_assign_get_grades.
      parameters:
        - in: path
          name: assignmentId
          required: true
          schema:
            type: integer
          description: ID da tarefa no Moodle.
        - in: query
          name: since
          required: false
          schema:
            type: integer
          description: Timestamp Unix inicial.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /forums/{forumId}/discussions:
    get:
      operationId: getForumDiscussions
      summary: Consultar discussões de um fórum
      description: Usa mod_forum_get_forum_discussions.
      parameters:
        - in: path
          name: forumId
          required: true
          schema:
            type: integer
          description: ID do fórum no Moodle.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Página de resultados.
        - in: query
          name: perPage
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
          description: Resultados por página.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /discussions/{discussionId}/posts:
    get:
      operationId: getDiscussionPosts
      summary: Consultar posts de uma discussão
      description: Usa mod_forum_get_discussion_posts.
      parameters:
        - in: path
          name: discussionId
          required: true
          schema:
            type: integer
          description: ID da discussão no Moodle.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /modules/{cmid}/rubric:
    get:
      operationId: getModuleRubric
      summary: Consultar rubrica ou guia de avaliação de um módulo
      description: Usa core_grading_get_definitions com plugintype=pluginname=rubric.
      parameters:
        - in: path
          name: cmid
          required: true
          schema:
            type: integer
          description: ID do módulo do curso no Moodle.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /files/download:
    get:
      operationId: getModuleFileContent
      summary: Baixar ou ler o conteúdo de um arquivo do Moodle
      description: >
        Baixa um arquivo do Moodle usando uma URL obtida em conteúdos ou recursos do curso.
        O token Moodle é adicionado automaticamente. Para PDFs, tenta extrair texto; para arquivos
        de texto e JSON, retorna conteúdo; para outros binários, retorna metadados e downloadUrl.
      parameters:
        - in: query
          name: fileurl
          required: true
          schema:
            type: string
          description: URL do arquivo no Moodle, normalmente vinda de fileurl ou downloadurl.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

  /reports/pending-grading:
    get:
      operationId: reportPendingGrading
      summary: Relatório de entregas pendentes de correção
      description: >
        Busca tarefas do curso, submissões e notas. Lista entregas submetidas sem correção
        conforme gradingstatus ou ausência de nota.
      parameters:
        - in: query
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
        - in: query
          name: since
          required: false
          schema:
            type: integer
          description: Timestamp Unix inicial.
        - in: query
          name: before
          required: false
          schema:
            type: integer
          description: Timestamp Unix final.
        - in: query
          name: limitAssignments
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Limite de tarefas avaliativas consideradas.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/pending-delivery:
    get:
      operationId: reportPendingDelivery
      summary: Relatório de atividades pendentes de entrega
      description: Identifica tarefas com prazo no período e participantes sem submissão enviada.
      parameters:
        - in: query
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
        - in: query
          name: dueFrom
          required: false
          schema:
            type: integer
          description: Timestamp Unix inicial do prazo.
        - in: query
          name: dueTo
          required: false
          schema:
            type: integer
          description: Timestamp Unix final do prazo. Se omitido, usa o momento atual.
        - in: query
          name: onlyActive
          required: false
          schema:
            type: boolean
            default: true
        - in: query
          name: limitStudents
          required: false
          schema:
            type: integer
            default: 500
            maximum: 1000
          description: Limite de estudantes considerados.
        - in: query
          name: limitAssignments
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Limite de tarefas avaliativas consideradas.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/courses-summary:
    get:
      operationId: reportCoursesSummary
      summary: Gerar resumo rápido para uma lista de cursos
      description: >
        Relatório composto para múltiplos cursos. Retorna participantes encontrados, quantidade
        de atividades, entregas pendentes de correção, notas lançadas e inventário básico.
      parameters:
        - in: query
          name: courseIds
          required: true
          schema:
            type: string
          description: IDs dos cursos separados por vírgula. O proxy processa até 10 cursos por chamada.
        - in: query
          name: limitAssignments
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Limite de tarefas avaliativas consideradas.
        - in: query
          name: limitStudents
          required: false
          schema:
            type: integer
            default: 500
            maximum: 1000
          description: Limite de estudantes considerados.
        - in: query
          name: pendingItemLimit
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
          description: Número máximo de itens pendentes retornados por curso.
        - in: query
          name: includeContents
          required: false
          schema:
            type: boolean
            default: true
        - in: query
          name: includeGradebook
          required: false
          schema:
            type: boolean
            default: true
        - in: query
          name: includePendingDelivery
          required: false
          schema:
            type: boolean
            default: false
          description: Se true, também calcula entregas pendentes no período informado.
        - in: query
          name: dueFrom
          required: false
          schema:
            type: integer
          description: Timestamp Unix inicial para prazos quando includePendingDelivery=true.
        - in: query
          name: dueTo
          required: false
          schema:
            type: integer
          description: Timestamp Unix final para prazos quando includePendingDelivery=true.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/students-risk:
    get:
      operationId: reportStudentsRisk
      summary: Identificar alunos em atenção, risco ou crítico em uma lista de cursos
      description: >
        Relatório composto que cruza último acesso, nota percentual do curso quando disponível
        e, opcionalmente, conclusão de atividades.
      parameters:
        - in: query
          name: courseIds
          required: true
          schema:
            type: string
          description: IDs dos cursos separados por vírgula. O proxy processa até 10 cursos por chamada.
        - in: query
          name: minGradePercent
          required: false
          schema:
            type: integer
            default: 60
            minimum: 0
            maximum: 100
          description: Percentual mínimo usado para classificar risco por nota.
        - in: query
          name: inactiveDays
          required: false
          schema:
            type: integer
            default: 15
            minimum: 1
            maximum: 365
          description: Dias sem acesso usados como critério de engajamento.
        - in: query
          name: limitStudents
          required: false
          schema:
            type: integer
            default: 100
            maximum: 250
        - in: query
          name: onlyActive
          required: false
          schema:
            type: boolean
            default: true
        - in: query
          name: includeGrades
          required: false
          schema:
            type: boolean
            default: true
        - in: query
          name: includeCompletion
          required: false
          schema:
            type: boolean
            default: false
        - in: query
          name: onlyRisk
          required: false
          schema:
            type: boolean
            default: true
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/course-gradebook:
    get:
      operationId: reportCourseGradebook
      summary: Consultar notas lançadas em atividades avaliativas por curso
      description: >
        Relatório composto por atividades. Retorna por curso e por atividade quantas notas
        foram lançadas, média encontrada e última alteração de nota. Opcionalmente retorna linhas.
      parameters:
        - in: query
          name: courseIds
          required: true
          schema:
            type: string
          description: IDs dos cursos separados por vírgula. O proxy processa até 10 cursos por chamada.
        - in: query
          name: limitAssignments
          required: false
          schema:
            type: integer
            default: 50
            maximum: 200
          description: Limite de tarefas avaliativas consideradas.
        - in: query
          name: since
          required: false
          schema:
            type: integer
          description: Timestamp Unix inicial.
        - in: query
          name: includeRows
          required: false
          schema:
            type: boolean
            default: false
          description: Se true, inclui linhas de notas por aluno.
        - in: query
          name: rowLimit
          required: false
          schema:
            type: integer
            default: 200
            maximum: 1000
          description: Limite total de linhas de notas por curso quando includeRows=true.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /reports/course-audit:
    get:
      operationId: auditCourseMaterials
      summary: Auditar materiais e cronograma de um curso
      description: >
        Consulta conteúdos, seções e módulos do curso e compara com listas de itens esperados,
        tipos obrigatórios e palavras-chave de cronograma.
      parameters:
        - in: query
          name: courseId
          required: true
          schema:
            type: integer
          description: ID do curso no Moodle.
        - in: query
          name: expectedItems
          required: false
          schema:
            type: string
          description: Lista de materiais esperados separados por vírgula, ponto e vírgula, quebra de linha ou barra vertical.
        - in: query
          name: requiredTypes
          required: false
          schema:
            type: string
          description: Tipos de módulo obrigatórios, como assign, resource, url, quiz ou page.
        - in: query
          name: scheduleKeywords
          required: false
          schema:
            type: string
          description: Palavras-chave para localizar cronograma, como cronograma, calendário ou agenda.
      responses:
        "200":
          $ref: "#/components/responses/MoodleOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        Chave de API gah_live_* gerada no painel do GPT Actions Hub.
        Não é o token do Moodle; é a chave pessoal do usuário para autenticar no proxy.
  responses:
    MoodleOk:
      description: Resposta bem-sucedida do Moodle ou do relatório composto.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MoodleResult"
    BadRequest:
      description: Parâmetros obrigatórios ausentes ou inválidos.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Chave de API inválida, revogada ou expirada.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Serviço Moodle inativo, indisponível ou sem permissão para esta conta.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Recurso não encontrado.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    GatewayTimeout:
      description: Timeout ao chamar o Moodle ou baixar arquivo.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    MoodleResult:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: true
        source:
          type: string
        generatedAt:
          type: string
          format: date-time
        data:
          description: Dados retornados pelo Moodle ou pelo relatório composto.
        warnings:
          type: array
          items:
            type: object
            additionalProperties: true
    ErrorResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
          examples:
            - unauthorized
            - service_inactive
            - moodle_session_required
        message:
          type: string
        status:
          type: integer
