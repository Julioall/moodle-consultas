<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodle Consultas — Obter Chave de API</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 440px;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: .25rem;
    }

    .subtitle {
      color: #666;
      font-size: .95rem;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: .875rem;
      font-weight: 600;
      color: #333;
      margin-bottom: .4rem;
    }

    input[type="text"],
    input[type="email"] {
      width: 100%;
      padding: .625rem .875rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color .2s;
      outline: none;
      margin-bottom: 1.25rem;
    }

    input:focus { border-color: #4f46e5; }

    button[type="submit"] {
      width: 100%;
      padding: .75rem;
      background: #4f46e5;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s;
    }

    button[type="submit"]:hover { background: #4338ca; }
    button[type="submit"]:disabled { background: #a5b4fc; cursor: not-allowed; }

    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      padding: .75rem 1rem;
      border-radius: 8px;
      font-size: .9rem;
      margin-bottom: 1rem;
    }

    .result {
      display: none;
      margin-top: 1.75rem;
    }

    .result h2 {
      font-size: 1rem;
      color: #16a34a;
      margin-bottom: .5rem;
    }

    .result p {
      font-size: .875rem;
      color: #555;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    .key-box {
      display: flex;
      align-items: center;
      gap: .5rem;
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 8px;
      padding: .625rem .875rem;
    }

    .key-box code {
      flex: 1;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: .875rem;
      color: #166534;
      word-break: break-all;
    }

    .copy-btn {
      background: none;
      border: 1.5px solid #16a34a;
      color: #16a34a;
      border-radius: 6px;
      padding: .3rem .65rem;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }

    .copy-btn:hover { background: #dcfce7; }
    .copy-btn.copied { border-color: #15803d; background: #dcfce7; }

    .warning {
      margin-top: 1rem;
      font-size: .8rem;
      color: #b45309;
      background: #fef3c7;
      border: 1px solid #fcd34d;
      border-radius: 6px;
      padding: .6rem .875rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎓 Moodle Consultas</div>
    <div class="subtitle">Proxy somente leitura para GPT Actions</div>

    <form id="registerForm">
      <label for="name">Nome</label>
      <input type="text" id="name" placeholder="Seu nome completo" required autocomplete="name" />

      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />

      <div class="error-msg" id="errorMsg"></div>

      <button type="submit" id="submitBtn">Gerar minha chave de API</button>
    </form>

    <div class="result" id="result">
      <h2>✅ Chave gerada com sucesso!</h2>
      <p>Copie sua chave de API abaixo e guarde em local seguro. <strong>Ela não será exibida novamente.</strong></p>
      <div class="key-box">
        <code id="apiKeyDisplay"></code>
        <button class="copy-btn" id="copyBtn" onclick="copyKey()">Copiar</button>
      </div>
      <div class="warning">
        ⚠️ Use esta chave como <strong>Bearer token</strong> no campo de autenticação da Action do ChatGPT.
      </div>
    </div>
  </div>

  <script>
    // ⚙️ Altere este URL caso o projeto Supabase mude
    const REGISTER_URL = "https://scrzziyuruzzhebpzvdl.supabase.co/functions/v1/register";

    const form = document.getElementById("registerForm");
    const submitBtn = document.getElementById("submitBtn");
    const errorMsg = document.getElementById("errorMsg");
    const result = document.getElementById("result");
    const apiKeyDisplay = document.getElementById("apiKeyDisplay");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.style.display = "none";
      submitBtn.disabled = true;
      submitBtn.textContent = "Gerando...";

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim().toLowerCase();

      try {
        const res = await fetch(REGISTER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email }),
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          showError(data.message || "Erro ao cadastrar. Tente novamente.");
          return;
        }

        apiKeyDisplay.textContent = data.api_key;
        form.style.display = "none";
        result.style.display = "block";
      } catch {
        showError("Erro de conexão. Verifique sua internet e tente novamente.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Gerar minha chave de API";
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = "block";
    }

    function copyKey() {
      const key = apiKeyDisplay.textContent;
      navigator.clipboard.writeText(key).then(() => {
        const btn = document.getElementById("copyBtn");
        btn.textContent = "Copiado!";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copiar"; btn.classList.remove("copied"); }, 2000);
      });
    }
  </script>
</body>
</html>
